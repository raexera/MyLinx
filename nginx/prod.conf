# ═══════════════════════════════════════════════════════════════
# DEFAULT SERVER — catches requests with unknown/missing Host
# Blocks direct IP access (http://129.212.230.161)
# ═══════════════════════════════════════════════════════════════
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    return 444;
}

server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    server_name _;
    ssl_certificate /etc/letsencrypt/live/mylinx.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mylinx.tech/privkey.pem;
    return 444;
}

# ═══════════════════════════════════════════════════════════════
# HTTP → HTTPS redirect for mylinx.tech
# ═══════════════════════════════════════════════════════════════
server {
    listen 80;
    listen [::]:80;
    server_name mylinx.tech www.mylinx.tech;
    return 301 https://$host$request_uri;
}

# ═══════════════════════════════════════════════════════════════
# MAIN HTTPS SERVER — serves the Laravel app
# ═══════════════════════════════════════════════════════════════
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name mylinx.tech www.mylinx.tech;

    ssl_certificate /etc/letsencrypt/live/mylinx.tech/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/mylinx.tech/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    root /var/www/html/public;
    index index.php;

    charset utf-8;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    server_tokens off;

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    client_max_body_size 12M;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~* \.(css|js|woff2|woff|ttf|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    error_page 404 /index.php;

    error_page 413 @413_json;
    location @413_json {
        default_type application/json;
        return 413 '{"error":"File terlalu besar. Ukuran maksimal 10MB per upload."}';
    }

    location ~ ^/index\.php(/|$) {
        fastcgi_pass app:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param HTTPS on;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 60;
    }

    location ~ /\.(?!well-known).* { deny all; }
    location ~ /\.env               { deny all; }
}
